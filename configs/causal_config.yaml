# Causal model configuration
causal:
  output_graph: "outputs/causal_graphs/causal_graph.gpickle"
  output_intents: "outputs/causal_graphs/agent_intents.pkl"
  output_counterfactual: "outputs/causal_graphs/counterfactual_results.pkl"
  threshold_moving: 1.0
  max_scenes: 10
  intent_categories:
    - "moving_straight"
    - "turning_left"
    - "turning_right"
    - "stopping"
    - "stationary"
  graph:
    min_edge_weight: 0.1
    max_distance: 20.0